<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seismograph</title>

  <!-- Leaflet's stylesheet, loaded straight from a free CDN (no install needed) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Our own styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- The map fills the whole window. Leaflet draws into this empty box. -->
  <div id="map"></div>

  <!-- The sidebar floats on top of the map, on the left. -->
  <aside id="sidebar">
    <h1>🌏 Seismograph</h1>

    <!-- The "status" line. It starts empty and gets updated by JavaScript. -->
    <p id="status">Pick a magnitude, then click the map to start a quake there — or press the button for a random one.</p>

    <!-- Magnitude slider: drag to choose a small or big quake. -->
    <label id="mag-label" for="mag">Magnitude: <span id="mag-value">6.5</span></label>
    <input id="mag" type="range" min="4" max="9" step="0.1" value="6.5" />

    <button id="trigger">⚡ Trigger a quake</button>

    <h2>Arrivals log</h2>
    <ol id="log"></ol>
  </aside>

  <!-- Leaflet's JavaScript library, also from the free CDN -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Our own program. It runs last, after Leaflet is ready. -->
  <script src="main.js"></script>
</body>
</html>
